<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Só Vitória Motos — Gestão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0E10;
    --surface1:#18181B;
    --surface2:#202024;
    --border:#2B2B2F;
    --border-strong:#3A3A40;
    --yellow:#FFC800;
    --yellow-deep:#C79600;
    --yellow-dim:#5A4A00;
    --text:#F5F4EF;
    --text-dim:#A5A4A0;
    --text-faint:#6E6D6A;
    --red:#E5484D;
    --red-bg:#3A1518;
    --green:#4ECB8D;
    --green-bg:#0F2B22;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:960px;margin:0 auto;padding:0 20px 60px;}

  /* HEADER */
  .header{
    background:linear-gradient(180deg,#141416,#0E0E10);
    border-bottom:3px solid var(--yellow);
    padding:28px 20px 22px;
    margin-bottom:28px;
  }
  .header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:16px;}
  .logo-mark{
    width:50px;height:54px;border-radius:8px;
    background:var(--yellow);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .logo-mark svg{width:32px;height:32px;}
  .brand-name{
    font-family: fantasy;
    font-weight:700px;
    font-size:26px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:var(--text);
    margin:0;
    line-height:1.1;
  }
  .brand-name span{color:var(--yellow);}
  .brand-tag{
    font-size:12px;
    color:var(--text-faint);
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin:2px 0 0;
  }

  /* DASHBOARD */
  .dash{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:12px;
    margin-bottom:28px;
  }
  .stat{
    background:var(--surface1);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 18px;
  }
  .stat-label{
    font-size:12px;
    color:var(--text-faint);
    text-transform:uppercase;
    letter-spacing:0.8px;
    margin:0 0 8px;
  }
  .stat-value{
    font-family:'Oswald',sans-serif;
    font-size:24px;
    font-weight:600;
    margin:0;
  }
  .stat-sub{font-size:12px;color:var(--text-dim);margin:4px 0 0;}
  .stat.accent{border-color:var(--yellow-dim);}
  .stat.accent .stat-value{color:var(--yellow);}
  .stat-value.profit-pos{color:var(--green);}
  .stat-value.profit-neg{color:var(--red);}

  /* TOOLBAR */
  .toolbar{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .search-input{
    flex:1;
    min-width:160px;
    background:var(--surface1);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 14px;
    border-radius:var(--radius);
    font-size:14px;
    font-family:'Inter',sans-serif;
  }
  .search-input:focus{outline:none;border-color:var(--yellow-deep);}
  .btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    padding:10px 16px;
    border-radius:var(--radius);
    border:1px solid var(--border-strong);
    background:var(--surface1);
    color:var(--text);
    cursor:pointer;
    white-space:nowrap;
  }
  .btn:hover{background:var(--surface2);}
  .btn-primary{
    background:var(--yellow);
    color:#1A1300;
    border-color:var(--yellow);
  }
  .btn-primary:hover{background:#FFD540;}
  .btn-danger{color:var(--red);}
  .btn-sm{padding:7px 12px;font-size:13px;}

  /* TABS */
  .tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--border);}
  .tab{
    padding:9px 4px;
    margin-right:18px;
    font-size:14px;
    font-weight:600;
    color:var(--text-faint);
    background:none;
    border:none;
    border-bottom:2px solid transparent;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .tab.active{color:var(--yellow);border-bottom-color:var(--yellow);}

  /* GRID DE MOTOS */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}
  .card{
    background:var(--surface1);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:14px 16px 0;
  }
  .plate{
    background:var(--yellow);
    color:#1A1300;
    font-family:'Roboto Mono',monospace;
    font-weight:700;
    font-size:13px;
    letter-spacing:1.5px;
    padding:4px 8px;
    border-radius:4px;
  }
  .badge{
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.5px;
    padding:4px 9px;
    border-radius:20px;
  }
  .badge-estoque{background:var(--yellow-dim);color:var(--yellow);}
  .badge-vendida{background:var(--green-bg);color:var(--green);}
  .card-body{padding:12px 16px 6px;}
  .moto-title{
    font-family:'Oswald',sans-serif;
    font-size:19px;
    font-weight:600;
    margin:0 0 2px;
    text-transform:uppercase;
  }
  .moto-meta{font-size:13px;color:var(--text-dim);margin:0 0 12px;}
  .fin-row{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    padding:6px 0;
    border-top:1px solid var(--border);
  }
  .fin-row .label{color:var(--text-faint);}
  .fin-row .value{font-weight:600;}
  .fin-row .value.pos{color:var(--green);}
  .fin-row .value.neg{color:var(--red);}
  .card-actions{
    display:flex;
    gap:8px;
    padding:12px 16px 16px;
    margin-top:auto;
  }
  .card-actions .btn{flex:1;text-align:center;}

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--text-faint);
  }
  .empty p{margin:6px 0;}

  /* MODAL */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.65);
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:40px 16px;
    overflow-y:auto;
    z-index:50;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--surface1);
    border:1px solid var(--border-strong);
    border-radius:12px;
    width:100%;
    max-width:480px;
    padding:24px;
  }
  .modal h2{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    font-size:19px;
    margin:0 0 18px;
    color:var(--yellow);
  }
  .field{margin-bottom:13px;}
  .field label{
    display:block;
    font-size:12px;
    color:var(--text-dim);
    margin-bottom:5px;
    text-transform:uppercase;
    letter-spacing:0.4px;
  }
  .field input, .field textarea{
    width:100%;
    background:var(--surface2);
    border:1px solid var(--border-strong);
    color:var(--text);
    padding:9px 11px;
    border-radius:8px;
    font-size:14px;
    font-family:'Inter',sans-serif;
  }
  .field input:focus, .field textarea:focus{outline:none;border-color:var(--yellow-deep);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions .btn{flex:1;}

  .status-msg{font-size:13px;color:var(--text-faint);text-align:center;padding:14px 0;}

  /* GASTOS */
  .gasto-list{margin-bottom:16px;}
  .gasto-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:9px 0;
    border-bottom:1px solid var(--border);
    font-size:13px;
  }
  .gasto-item:last-child{border-bottom:none;}
  .gasto-desc{font-weight:600;}
  .gasto-date{color:var(--text-faint);font-size:12px;}
  .gasto-value{font-weight:600;color:var(--red);white-space:nowrap;margin-left:10px;}
  .gasto-del{
    background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:16px;
    padding:2px 6px;margin-left:6px;
  }
  .gasto-del:hover{color:var(--red);}
  .gasto-total{
    display:flex;justify-content:space-between;font-size:13px;font-weight:600;
    padding-top:10px;margin-top:4px;border-top:1px solid var(--border-strong);
  }
  .divider-label{
    font-size:11px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-faint);
    margin:16px 0 8px;
  }

  /* LOGIN */
  .center-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .auth-box{
    width:100%;
    max-width:380px;
    background:var(--surface1);
    border:1px solid var(--border);
    border-radius:12px;
    padding:28px 26px;
  }
  .auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
  .auth-title{font-family:'Oswald',sans-serif;font-size:15px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.6px;margin:0 0 16px;}
  .auth-error{
    background:var(--red-bg);color:var(--red);font-size:13px;
    padding:9px 12px;border-radius:8px;margin-bottom:14px;display:none;
  }
  .auth-error.show{display:block;}
  .auth-switch{text-align:center;font-size:13px;color:var(--text-dim);margin-top:16px;}
  .auth-switch a{color:var(--yellow);cursor:pointer;text-decoration:none;font-weight:600;}
  .setup-help{
    font-size:12px;color:var(--text-faint);line-height:1.7;margin-bottom:14px;
    background:var(--surface2);padding:12px 14px;border-radius:8px;
  }
  .setup-help a{color:var(--yellow);}
  .setup-help code{color:var(--yellow);}
  .user-bar{
    max-width:960px;margin:0 auto;display:flex;justify-content:flex-end;
    align-items:center;gap:10px;padding:10px 20px 0;font-size:13px;color:var(--text-dim);
  }
  .user-bar a{color:var(--yellow);cursor:pointer;font-weight:600;}

  @media(max-width:480px){
    .field-row{grid-template-columns:1fr;}
  }
  #foto{
    height: 110%;
    border-radius: 70%;
    
  }
  .logo-mark{
    border-radius: 60%;
  }
</style>
</head>
<body>

<!-- TELA DE LOGIN / CRIAR CONTA (Firebase Authentication) -->
<div class="center-screen" id="authScreen" style="display:none;">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-mark">
        <img src="EEC90E80-6102-4E3C-9BCE-D0A2170D912D.jpeg" alt="" srcset="" id="foto">
      </div>
      <div><p class="brand-name" style="font-size:18px;">Só <span>Vitória Motos</span></p></div>
    </div>
    <p class="auth-title" style="margin-top:0;" id="authModeLabel">Entrar</p>
    <div class="auth-error" id="authError"></div>
    <form id="authForm">
      <div class="field"><label>E-mail</label><input type="email" id="authEmail" required placeholder="voce@exemplo.com"></div>
      <div class="field"><label>Senha</label><input type="password" id="authSenha" required minlength="6" placeholder="Mínimo 6 caracteres"></div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary" style="width:100%;" id="authSubmitBtn">Entrar</button>
      </div>
    </form>
  </div>
</div>

<div id="appScreen" style="display:none;">

<div class="user-bar">
  <span id="userEmailLabel"></span>
  <a id="logoutLink">Sair</a>
</div>

<div class="header">
  <div class="header-inner">
    <div class="logo-mark">
      <img src="EEC90E80-6102-4E3C-9BCE-D0A2170D912D.jpeg" alt="" srcset="" id="foto">
    </div>
    <div>
      <p class="brand-name">Só <span>Vitória Motos</span></p>
      <p class="brand-tag">Controle de compra e venda</p>
    </div>
  </div>
</div>

<div class="wrap">

  <div class="dash" id="dash"></div>

  <div class="toolbar">
    <input type="text" class="search-input" id="searchInput" placeholder="Buscar por marca, modelo ou placa...">
    <button class="btn btn-primary" id="btnAdd">+ Nova moto</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-filter="estoque">Estoque</button>
    <button class="tab" data-filter="vendida">Vendidas</button>
    <button class="tab" data-filter="todas">Todas</button>
  </div>

  <div id="listWrap">
    <div class="status-msg">Carregando dados...</div>
  </div>

</div>

<!-- MODAL: Adicionar/Editar -->
<div class="modal-overlay" id="modalForm">
  <div class="modal">
    <h2 id="formTitle">Nova moto</h2>
    <form id="motoForm">
      <input type="hidden" id="motoId">
      <div class="field-row">
        <div class="field"><label>Marca</label><input type="text" id="fMarca" required placeholder="Honda"></div>
        <div class="field"><label>Modelo</label><input type="text" id="fModelo" required placeholder="CG 160"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Ano</label><input type="number" id="fAno" required placeholder="2020"></div>
        <div class="field"><label>Placa</label><input type="text" id="fPlaca" placeholder="ABC1D23" style="text-transform:uppercase"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Cor</label><input type="text" id="fCor" placeholder="Preta"></div>
        <div class="field"><label>KM</label><input type="number" id="fKm" placeholder="32000"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Valor de compra (R$)</label><input type="number" step="0.01" id="fValorCompra" required placeholder="8500"></div>
        <div class="field"><label>Data da compra</label><input type="date" id="fDataCompra" required></div>
      </div>
      <div class="field"><label>Fornecedor / vendedor</label><input type="text" id="fFornecedor" placeholder="Nome de quem vendeu a moto"></div>
      <div class="field"><label>Observações</label><textarea id="fObs" rows="2" placeholder="Estado geral, pendências, etc."></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn" id="btnCancelForm">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL: Vender -->
<div class="modal-overlay" id="modalSell">
  <div class="modal">
    <h2>Registrar venda</h2>
    <form id="sellForm">
      <input type="hidden" id="sMotoId">
      <div class="field"><label>Valor de venda (R$)</label><input type="number" step="0.01" id="sValorVenda" required></div>
      <div class="field"><label>Data da venda</label><input type="date" id="sDataVenda" required></div>
      <div class="field"><label>Comprador</label><input type="text" id="sComprador" placeholder="Nome do comprador"></div>
      <div class="modal-actions">
        <button type="button" class="btn" id="btnCancelSell">Cancelar</button>
        <button type="submit" class="btn btn-primary">Confirmar venda</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL: Gastos -->
<div class="modal-overlay" id="modalGasto">
  <div class="modal">
    <h2>Gastos da moto</h2>
    <input type="hidden" id="gMotoId">
    <div class="gasto-list" id="gastoList"></div>
    <div class="gasto-total" id="gastoTotalLine"></div>
    <p class="divider-label">Adicionar novo gasto</p>
    <form id="gastoForm">
      <div class="field"><label>O que foi</label><input type="text" id="gDescricao" required placeholder="Troca de pneu dianteiro"></div>
      <div class="field-row">
        <div class="field"><label>Valor (R$)</label><input type="number" step="0.01" id="gValor" required placeholder="180"></div>
        <div class="field"><label>Data</label><input type="date" id="gData" required></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn" id="btnCloseGasto">Fechar</button>
        <button type="submit" class="btn btn-primary">Adicionar gasto</button>
      </div>
    </form>
  </div>
</div>

</div><!-- /appScreen -->

<!-- IMPORTAÇÕES DO FIREBASE CONFIGURADAS CORRETAMENTE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-auth-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-firestore-compat.min.js"></script>
<script>
let motos = [];
let currentFilter = 'estoque';
let searchTerm = '';

const fmtMoney = v => (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtDate = d => { if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; };

/* SISTEMA ATUALIZADO PARA LER DO FIRESTORE ONLINE */
async function loadData(){
  try {
    const user = firebase.auth().currentUser;
    if (!user) return;

    if (typeof firebase.firestore !== 'function') {
      console.error("Firestore não disponível.");
      return;
    }

    const db = firebase.firestore();
    const querySnapshot = await db.collection("motos")
                                  .where("userId", "==", user.uid)
                                  .get();
    
    motos = [];
    querySnapshot.forEach((doc) => {
      motos.push({ id: doc.id, ...doc.data() });
    });

  } catch(e) {
    console.error('Erro ao carregar dados do Firebase:', e);
    motos = [];
  }
  render();
}

/* SISTEMA ATUALIZADO PARA GRAVAR NO FIRESTORE ONLINE EM TEMPO REAL */
async function saveData(){
  try {
    const user = firebase.auth().currentUser;
    if (!user) {
      alert('Você precisa estar logado para salvar.');
      return;
    }

    const db = firebase.firestore();
    
    for (const moto of motos) {
      moto.userId = user.uid; 
      
      const motoDados = { ...moto };
      delete motoDados.id; 

      await db.collection("motos").doc(moto.id).set(motoDados, { merge: true });
    }

    console.log("Dados sincronizados com o Firebase com sucesso!");
  } catch(e) {
    console.error('Erro ao salvar no Firebase:', e);
    alert('Não foi possível salvar os dados online. Tente novamente.');
  }
}

function gastosTotal(m){
  return (m.gastos||[]).reduce((s,g)=>s+Number(g.valor||0),0);
}

function calcDash(){
  const emEstoque = motos.filter(m=>m.status==='estoque');
  const vendidas = motos.filter(m=>m.status==='vendida');
  const totalInvestido = emEstoque.reduce((s,m)=>s+Number(m.valorCompra||0)+gastosTotal(m),0);
  const lucroTotal = vendidas.reduce((s,m)=>s+(Number(m.valorVenda||0)-(Number(m.valorCompra||0)+gastosTotal(m))),0);
  const ticketMedio = vendidas.length ? lucroTotal/vendidas.length : 0;
  return {emEstoque:emEstoque.length, totalInvestido, vendidas:vendidas.length, lucroTotal, ticketMedio};
}

function renderDash(){
  const d = calcDash();
  const dash = document.getElementById('dash');
  const lucroClass = d.lucroTotal>=0 ? 'profit-pos' : 'profit-neg';
  dash.innerHTML = `
    <div class="stat accent">
      <p class="stat-label">Em estoque</p>
      <p class="stat-value">${d.emEstoque}</p>
      <p class="stat-sub">${fmtMoney(d.totalInvestido)} investidos</p>
    </div>
    <div class="stat">
      <p class="stat-label">Motos vendidas</p>
      <p class="stat-value">${d.vendidas}</p>
      <p class="stat-sub">Total no histórico</p>
    </div>
    <div class="stat">
      <p class="stat-label">Lucro total</p>
      <p class="stat-value ${lucroClass}">${fmtMoney(d.lucroTotal)}</p>
      <p class="stat-sub">Soma de todas as vendas</p>
    </div>
    <div class="stat">
      <p class="stat-label">Lucro médio por moto</p>
      <p class="stat-value">${fmtMoney(d.ticketMedio)}</p>
      <p class="stat-sub">Por moto vendida</p>
    </div>
  `;
}

function renderList(){
  const wrap = document.getElementById('listWrap');
  let list = motos.slice();
  if(currentFilter!=='todas') list = list.filter(m=>m.status===currentFilter);
  if(searchTerm){
    const t = searchTerm.toLowerCase();
    list = list.filter(m => (m.marca+' '+m.modelo+' '+(m.placa||'')).toLowerCase().includes(t));
  }
  list.sort((a,b)=> b.criadoEm - a.criadoEm);

  if(list.length===0){
    wrap.innerHTML = `<div class="empty">
      <p style="font-family:'Oswald',sans-serif;font-size:17px;text-transform:uppercase;color:var(--text-dim);">Nenhuma moto encontrada</p>
      <p>Cadastre uma moto para começar a controlar seu estoque.</p>
    </div>`;
    return;
  }

  wrap.innerHTML = `<div class="grid">${list.map(cardHtml).join('')}</div>`;
}

function cardHtml(m){
  const vendida = m.status==='vendida';
  const gTotal = gastosTotal(m);
  let finHtml = `<div class="fin-row"><span class="label">Compra</span><span class="value">${fmtMoney(m.valorCompra)}</span></div>`;
  if(gTotal>0){
    finHtml += `<div class="fin-row"><span class="label">Gastos (${(m.gastos||[]).length})</span><span class="value neg">${fmtMoney(gTotal)}</span></div>`;
  }
  if(vendida){
    const lucro = Number(m.valorVenda||0) - (Number(m.valorCompra||0) + gTotal);
    finHtml += `<div class="fin-row"><span class="label">Venda</span><span class="value">${fmtMoney(m.valorVenda)}</span></div>`;
    finHtml += `<div class="fin-row"><span class="label">Lucro</span><span class="value ${lucro>=0?'pos':'neg'}">${fmtMoney(lucro)}</span></div>`;
  }
  const actions = vendida
    ? `<button class="btn btn-sm" onclick="openGasto('${m.id}')">Gastos</button>
       <button class="btn btn-sm" onclick="openEdit('${m.id}')">Editar</button>
       <button class="btn btn-sm btn-danger" onclick="removeMoto('${m.id}')">Excluir</button>`
    : `<button class="btn btn-sm btn-primary" onclick="openSell('${m.id}')">Vender</button>
       <button class="btn btn-sm" onclick="openGasto('${m.id}')">Gastos</button>
       <button class="btn btn-sm" onclick="openEdit('${m.id}')">Editar</button>
       <button class="btn btn-sm btn-danger" onclick="removeMoto('${m.id}')">Excluir</button>`;

  return `<div class="card">
    <div class="card-top">
      <span class="plate">${m.placa ? m.placa.toUpperCase() : 'S/ PLACA'}</span>
      <span class="badge ${vendida?'badge-vendida':'badge-estoque'}">${vendida?'Vendida':'Estoque'}</span>
    </div>
    <div class="card-body">
      <p class="moto-title">${m.marca} ${m.modelo}</p>
      <p class="moto-meta">${m.ano||'—'} · ${m.cor||'Cor não informada'}${m.km ? ' · '+Number(m.km).toLocaleString('pt-BR')+' km' : ''}</p>
      ${finHtml}
    </div>
    <div class="card-actions" style="flex-wrap:wrap;">${actions}</div>
  </div>`;
}

function render(){
  renderDash();
  renderList();
}

document.getElementById('searchInput').addEventListener('input', e=>{

/* MODAL: FORM (add/edit) */
const modalForm = document.getElementById('modalForm');
const motoForm = document.getElementById('motoForm');

function openAdd(){
  document.getElementById('formTitle').textContent = 'Nova moto';
  motoForm.reset();
  document.getElementById('motoId').value = '';
  document.getElementById('fDataCompra').value = new Date().toISOString().slice(0,10);
  modalForm.classList.add('open');
}

function openEdit(id){
  const m = motos.find(x=>x.id===id);
  if(!m) return;
  document.getElementById('formTitle').textContent = 'Editar moto';
  document.getElementById('motoId').value = m.id;
  document.getElementById('fMarca').value = m.marca||'';
  document.getElementById('fModelo').value = m.modelo||'';
  document.getElementById('fAno').value = m.ano||'';
  document.getElementById('fPlaca').value = m.placa||'';
  document.getElementById('fCor').value = m.cor||'';
  document.getElementById('fKm').value = m.km||'';
  document.getElementById('fValorCompra').value = m.valorCompra||'';
  document.getElementById('fDataCompra').value = m.dataCompra||'';
  document.getElementById('fFornecedor').value = m.fornecedor||'';
  document.getElementById('fObs').value = m.obs||'';
  modalForm.classList.add('open');
}

document.getElementById('btnAdd').addEventListener('click', openAdd);
document.getElementById('btnCancelForm').addEventListener('click', ()=> modalForm.classList.remove('open'));

motoForm.addEventListener('submit', async e=>{
  e.preventDefault();
  const id = document.getElementById('motoId').value;
  const data = {
    marca: document.getElementById('fMarca').value.trim(),
    modelo: document.getElementById('fModelo').value.trim(),
    ano: document.getElementById('fAno').value,
    placa: document.getElementById('fPlaca').value.trim(),
    cor: document.getElementById('fCor').value.trim(),
    km: document.getElementById('fKm').value,
    valorCompra: document.getElementById('fValorCompra').value,
    dataCompra: document.getElementById('fDataCompra').value,
    fornecedor: document.getElementById('fFornecedor').value.trim(),
    obs: document.getElementById('fObs').value.trim(),
  };
  if(id){
    const m = motos.find(x=>x.id===id);
    Object.assign(m, data);
  } else {
    motos.push({
      id: 'm_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
      status:'estoque',
      criadoEm: Date.now(),
      ...data
    });
  }
  modalForm.classList.remove('open');
  render();
  await saveData();
});

/* MODAL: SELL */

const sellForm = document.getElementById('sellForm');

function openSell(id){
  document.getElementById('sMotoId').value = id;
  sellForm.reset();
  document.getElementById('sDataVenda').value = new Date().toISOString().slice(0,10);
  modalSell.classList.add('open');
}

document.getElementById('btnCancelSell').addEventListener('click', ()=> modalSell.classList.remove('open'));

sellForm.addEventListener('submit', async e=>{

  if(!m) return;

  modalSell.classList.remove('open');
  render();

/* DELETE - AGORA DELETA TAMBÉM DO BANCO ONLINE */
async function removeMoto(id) {
  const m = motos.find(x => x.id === id);
  if (!m) return;
  if (!confirm(`Excluir ${m.marca} ${m.modelo} (${m.placa || 'sem placa'})? Essa ação não pode ser desfeita.`)) return;
  
  try {
    const user = firebase.auth().currentUser;
    if (user) {
      const db = firebase.firestore();
      await db.collection("motos").doc(id).delete();
      console.log("Moto excluída do Firebase com sucesso.");
    }
  } catch (error) {
    console.error("Erro ao deletar moto no Firebase:", error);
  }

  motos = motos.filter(x => x.id !== id);
  render();
}

/* MODAL: GASTOS */
const modalGasto = document.getElementById('modalGasto');
const gastoForm = document.getElementById('gastoForm');

function renderGastoList(m){
  const list = document.getElementById('gastoList');
  const gastos = m.gastos||[];
  if(gastos.length===0){
    list.innerHTML = `<p class="status-msg" style="padding:6px 0;">Nenhum gasto lançado ainda.</p>`;
  } else {
    list.innerHTML = gastos.map(g=>`
      <div class="gasto-item">
        <div>
          <div class="gasto-desc">${g.descricao}</div>
          <div class="gasto-date">${fmtDate(g.data)}</div>
        </div>
        <div style="display:flex;align-items:center;">
          <span class="gasto-value">${fmtMoney(g.valor)}</span>
          <button class="gasto-del" onclick="removeGasto('${g.id}')" aria-label="Excluir gasto">&times;</button>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('gastoTotalLine').innerHTML =
    `<span>Total em gastos</span><span>${fmtMoney(gastosTotal(m))}</span>`;
}

function openGasto(id){
  document.getElementById('gMotoId').value = id;
  gastoForm.reset();
  document.getElementById('gData').value = new Date().toISOString().slice(0,10);
  const m = motos.find(x=>x.id===id);
  renderGastoList(m);
  modalGasto.classList.add('open');
}

document.getElementById('btnCloseGasto').addEventListener('click', ()=> modalGasto.classList.remove('open'));

gastoForm.addEventListener('submit', async e=>{
  e.preventDefault();
  const id = document.getElementById('gMotoId').value;
  const m = motos.find(x=>x.id===id);
  if(!m) return;
  if(!m.gastos) m.gastos = [];
  m.gastos.push({
    id: 'g_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
    descricao: document.getElementById('gDescricao').value.trim(),
    valor: document.getElementById('gValor').value,
    data: document.getElementById('gData').value
  });
  gastoForm.reset();
  document.getElementById('gData').value = new Date().toISOString().slice(0,10);
  renderGastoList(m);
  render();
  await saveData();
});

async function removeGasto(gastoId){
  const id = document.getElementById('gMotoId').value;
  const m = motos.find(x=>x.id===id);
  if(!m) return;
  m.gastos = (m.gastos||[]).filter(g=>g.id!==gastoId);
  renderGastoList(m);
  render();
  await saveData();
}

modalGasto.addEventListener('click', e=>{ if(e.target===modalGasto) modalGasto.classList.remove('open'); });

[modalForm, modalSell].forEach(ov=>{
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.classList.remove('open'); });
});

const authScreen = document.getElementById('authScreen');

function showOnly(el){
  [authScreen, appScreen].forEach(s=> s.style.display='none');
  el.style.display = (el===appScreen) ? 'block' : 'flex';
}

async function vincularMotosAntigas(novoUserId) {
  try {
    if (typeof firebase.firestore !== 'function') {
      return;
    }

    const db = firebase.firestore();
    const querySnapshot = await db.collection("motos").get();
    let contador = 0;

    for (const documento of querySnapshot.docs) {
      const dadosDaMoto = documento.data();
      if (!dadosDaMoto.userId) {
        await db.collection("motos").doc(documento.id).update({
          userId: novoUserId
        });
        contador++;
      }
    }

    if (contador > 0) {
      console.log(`Sucesso: ${contador} motos antigas vinculadas.`);
    }
  } catch (error) {
    console.error("Erro ao migrar as motos antigas:", error);
  }
}

function boot(){
  try{
    firebase.initializeApp(firebaseConfig);
  }catch(e){
    const errEl = document.getElementById('authError');
    if (errEl) {
      errEl.textContent = 'O sistema não pôde conectar ao Firebase.';
      errEl.classList.add('show');
    }
    return;
  }

  firebase.auth().onAuthStateChanged(async user=>{
    if(user){
      const emailLabel = document.getElementById('userEmailLabel');
      if (emailLabel) emailLabel.textContent = user.email;
      showOnly(appScreen);
      
      await vincularMotosAntigas(user.uid);
      await loadData();
    } else {
      showOnly(authScreen);
    }
  });
}

if (document.getElementById('authForm')) {
  document.getElementById('authForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const errEl = document.getElementById('authError');
    if (errEl) errEl.classList.remove('show');
    
    const email = document.getElementById('authEmail').value.trim();
    const senha = document.getElementById('authSenha').value;
    const btn = document.getElementById('authSubmitBtn');
    
    if (btn) {
      btn.disabled = true;
      btn.textContent = 'Carregando...';
    }

    try{
      await firebase.auth().signInWithEmailAndPassword(email, senha);
    } catch(error) {
      let mensagemErro = 'Ocorreu um erro. Tente novamente.';
      if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
        mensagemErro = 'E-mail ou senha inválidos.';
      } else if (error.code === 'auth/invalid-email') {
        mensagemErro = 'O formato do e-mail é inválido.';
      } else if (error.code === 'auth/weak-password') {
        mensagemErro = 'A senha deve ter pelo menos 6 caracteres.';
      } else {
        mensagemErro = error.message;
      }
      
      if (errEl) {
        errEl.textContent = mensagemErro;
        errEl.classList.add('show');
      }
    } finally {
      if (btn) {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }
  });
}

if (document.getElementById('logoutLink')) {
  document.getElementById('logoutLink').addEventListener('click', async e => {
    e.preventDefault();
    try {
      await firebase.auth().signOut();
    } catch (error) {
      alert('Erro ao sair: ' + error.message);
    }
  });
}

boot();
