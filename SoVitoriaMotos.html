<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Só Vitória Motos — Gestão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0E10;
    --surface1:#18181B;
    --surface2:#202024;
    --border:#2B2B2F;
    --border-strong:#3A3A40;
    --yellow:#FFC800;
    --yellow-deep:#C79600;
    --yellow-dim:#5A4A00;
    --text:#F5F4EF;
    --text-dim:#A5A4A0;
    --text-faint:#6E6D6A;
    --red:#E5484D;
    --red-bg:#3A1518;
    --green:#4ECB8D;
    --green-bg:#0F2B22;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:960px;margin:0 auto;padding:0 20px 60px;}

  /* HEADER COM A SUA LOGO REAL COPIADA */
  .header{
    background:linear-gradient(180deg,#141416,#0E0E10);
    border-bottom:3px solid var(--yellow);
    padding:28px 20px 22px;
    margin-bottom:28px;
  }
  .header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:20px;}
  
  /* CAIXINHA QUADRADA DA SUA LOGO */
  .logo-box{
    width:58px;
    height:58px;
    border-radius:10px;
    overflow:hidden; /* Garante que a foto respeite o cantinho arredondado da caixinha */
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    border: 1px solid var(--border-strong);
  }
  .logo-img{
    width:100%;
    height:100%;
    object-fit:cover; /* Faz a foto preencher o quadradinho perfeitamente */
  }

  .brand-name{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:26px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:#FFFFFF; /* "SÓ VITÓRIA" EM BRANCO */
    margin:0;
    line-height:1.1;
  }
  .brand-name span{
    color:var(--yellow); /* "MOTOS" EM AMARELO NO TOM EXATO DO SITE */
  }
  .brand-tag{
    font-size:12px;
    color:var(--text-faint);
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin:2px 0 0;
  }

  /* DASHBOARD */
  .dash{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:12px;
    margin-bottom:28px;
  }
  .stat{
    background:var(--surface1);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 18px;
  }
  .stat-label{
    font-size:12px;
    color:var(--text-faint);
    text-transform:uppercase;
    letter-spacing:0.8px;
    margin:0 0 8px;
  }
  .stat-value{
    font-family:'Oswald',sans-serif;
    font-size:24px;
    font-weight:600;
    margin:0;
  }
  .stat-sub{font-size:12px;color:var(--text-dim);margin:4px 0 0;}
  .stat.accent{border-color:var(--yellow-dim);}
  .stat.accent .stat-value{color:var(--yellow);}
  .stat-value.profit-pos{color:var(--green);}
  .stat-value.profit-neg{color:var(--red);}

  /* TOOLBAR */
  .toolbar{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .search-input{
    flex:1;
    min-width:160px;
    background:var(--surface1);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 14px;
    border-radius:var(--radius);
    font-size:14px;
    font-family:'Inter',sans-serif;
  }
  .search-input:focus{outline:none;border-color:var(--yellow-deep);}
  .btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    padding:10px 16px;
    border-radius:var(--radius);
    border:1px solid var(--border-strong);
    background:var(--surface1);
    color:var(--text);
    cursor:pointer;
    white-space:nowrap;
  }
  .btn:hover{background:var(--surface2);}
  .btn-primary{
    background:var(--yellow);
    color:#1A1300;
    border-color:var(--yellow);
  }
  .btn-primary:hover{background:#FFD540;}
  .btn-danger{color:var(--red);}
  .btn-sm{padding:7px 12px;font-size:13px;}

  /* TABS */
  .tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--border);}
  .tab{
    padding:9px 4px;
    margin-right:18px;
    font-size:14px;
    font-weight:600;
    color:var(--text-faint);
    background:none;
    border:none;
    border-bottom:2px solid transparent;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .tab.active{color:var(--yellow);border-bottom-color:var(--yellow);}

  /* GRID DE MOTOS */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}
  .card{
    background:var(--surface1);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:14px 16px 0;
  }
  .plate{
    background:var(--yellow);
    color:#1A1300;
    font-family:'Roboto Mono',monospace;
    font-weight:700;
    font-size:13px;
    letter-spacing:1.5px;
    padding:4px 8px;
    border-radius:4px;
  }
  .badge{
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.5px;
    padding:4px 9px;
    border-radius:20px;
  }
  .badge-estoque{background:var(--yellow-dim);color:var(--yellow);}
  .badge-vendida{background:var(--green-bg);color:var(--green);}
  .card-body{padding:12px 16px 6px;}
  .moto-title{
    font-family:'Oswald',sans-serif;
    font-size:19px;
    font-weight:600;
    margin:0 0 2px;
    text-transform:uppercase;
  }
  .moto-meta{font-size:13px;color:var(--text-dim);margin:0 0 12px;}
  .fin-row{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    padding:6px 0;
    border-top:1px solid var(--border);
  }
  .fin-row .label{color:var(--text-faint);}
  .fin-row .value{font-weight:600;}
  .fin-row .value.pos{color:var(--green);}
  .fin-row .value.neg{color:var(--red);}
  .card-actions{
    display:flex;
    gap:8px;
    padding:12px 16px 16px;
    margin-top:auto;
  }
  .card-actions .btn{flex:1;text-align:center;}

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--text-faint);
  }
  .empty p{margin:6px 0;}

  /* MODAL */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.65);
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:40px 16px;
    overflow-y:auto;
    z-index:50;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--surface1);
    border:1px solid var(--border-strong);
    border-radius:12px;
    width:100%;
    max-width:480px;
    padding:24px;
  }
  .modal h2{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    font-size:19px;
    margin:0 0 18px;
    color:var(--yellow);
  }
  .field{margin-bottom:13px;}
  .field label{
    display:block;
    font-size:12px;
    color:var(--text-dim);
    margin-bottom:5px;
    text-transform:uppercase;
    letter-spacing:0.4px;
  }
  .field input, .field textarea{
    width:100%;
    background:var(--surface2);
    border:1px solid var(--border-strong);
    color:var(--text);
    padding:9px 11px;
    border-radius:8px;
    font-size:14px;
    font-family:'Inter',sans-serif;
  }
  .field input:focus, .field textarea:focus{outline:none;border-color:var(--yellow-deep);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions .btn{flex:1;}

  .status-msg{font-size:13px;color:var(--text-faint);text-align:center;padding:14px 0;}

  @media(max-width:480px){
    .field-row{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <!-- Caixa quadrada contendo a sua imagem oficial carregada localmente -->
    <div class="logo-box">
      <img src="EEC90E80-6102-4E3C-9BCE-D0A2170D912D.jpeg" alt="Só Vitória Motos Logo" class="logo-img">
    </div>
    <div>
      <p class="brand-name">Só Vitória <span>Motos</span></p>
      <p class="brand-tag">Controle de compra e venda</p>
    </div>
  </div>
</div>

<div class="wrap">

  <div class="dash" id="dash"></div>

  <div class="toolbar">
    <input type="text" class="search-input" id="searchInput" placeholder="Buscar por marca, modelo ou placa...">
    <button class="btn btn-primary" id="btnAdd">+ Nova moto</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-filter="estoque">Estoque</button>
    <button class="tab" data-filter="vendida">Vendidas</button>
    <button class="tab" data-filter="todas">Todas</button>
  </div>

  <div id="listWrap">
    <div class="status-msg">Carregando dados do Firebase...</div>
  </div>

</div>

<div class="modal-overlay" id="modalForm">
  <div class="modal">
    <h2 id="formTitle">Nova moto</h2>
    <form id="motoForm">
      <input type="hidden" id="motoId">
      <div class="field-row">
        <div class="field"><label>Marca</label><input type="text" id="fMarca" required placeholder="Honda"></div>
        <div class="field"><label>Modelo</label><input type="text" id="fModelo" required placeholder="CG 160"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Ano</label><input type="number" id="fAno" required placeholder="2020"></div>
        <div class="field"><label>Placa</label><input type="text" id="fPlaca" placeholder="ABC1D23" style="text-transform:uppercase"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Cor</label><input type="text" id="fCor" placeholder="Preta"></div>
        <div class="field"><label>KM</label><input type="number" id="fKm" placeholder="32000"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Valor de compra (R$)</label><input type="number" step="0.01" id="fValorCompra" required placeholder="8500"></div>
        <div class="field"><label>Data da compra</label><input type="date" id="fDataCompra" required></div>
      </div>
      <div class="field"><label>Fornecedor / vendedor</label><input type="text" id="fFornecedor" placeholder="Nome de quem vendeu a moto"></div>
      <div class="field"><label>Observações</label><textarea id="fObs" rows="2" placeholder="Estado geral, pendências, etc."></textarea></div>
      <div class="modal-actions">
        <button type="button" class="btn" id="btnCancelForm">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="modalSell">
  <div class="modal">
    <h2>Registrar venda</h2>
    <form id="sellForm">
      <input type="hidden" id="sMotoId">
      <div class="field"><label>Valor de venda (R$)</label><input type="number" step="0.01" id="sValorVenda" required></div>
      <div class="field"><label>Data da venda</label><input type="date" id="sDataVenda" required></div>
      <div class="field"><label>Comprador</label><input type="text" id="sComprador" placeholder="Nome do comprador"></div>
      <div class="modal-actions">
        <button type="button" class="btn" id="btnCancelSell">Cancelar</button>
        <button type="submit" class="btn btn-primary">Confirmar venda</button>
      </div>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDet_nd2AfZAt0W_E7oP96ZEzOX0Ba1Uw8",
  authDomain: "sovitoriamotos-2e56f.firebaseapp.com",
  projectId: "sovitoriamotos-2e56f",
  storageBucket: "sovitoriamotos-2e56f.firebasestorage.app",
  messagingSenderId: "364373355687",
  appId: "1:364373355687:web:b43a84b14dca124014ff82"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let motos = [];
let currentFilter = 'estoque';
let searchTerm = '';

const fmtMoney = v => (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtDate = d => { if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; };

function loadData(){
  db.collection('motos').onSnapshot((snapshot) => {
    motos = [];
    snapshot.forEach((doc) => {
      motos.push({ id: doc.id, ...doc.data() });
    });
    render();
  }, (error) => {
    console.error("Erro ao escutar dados do Firestore: ", error);
    document.getElementById('listWrap').innerHTML = `<div class="status-msg" style="color:var(--red)">Erro ao conectar com o banco de dados. Verifique a configuração ou regras no painel do Firebase.</div>`;
  });
}

function calcDash(){
  const emEstoque = motos.filter(m=>m.status==='estoque');
  const vendidas = motos.filter(m=>m.status==='vendida');
  const totalInvestido = emEstoque.reduce((s,m)=>s+Number(m.valorCompra||0),0);
  const lucroTotal = vendidas.reduce((s,m)=>s+(Number(m.valorVenda||0)-Number(m.valorCompra||0)),0);
  const ticketMedio = vendidas.length ? lucroTotal/vendidas.length : 0;
  return {emEstoque:emEstoque.length, totalInvestido, vendidas:vendidas.length, lucroTotal, ticketMedio};
}

function renderDash(){
  const d = calcDash();
  const dash = document.getElementById('dash');
  const lucroClass = d.lucroTotal>=0 ? 'profit-pos' : 'profit-neg';
  dash.innerHTML = `
    <div class="stat accent">
      <p class="stat-label">Em estoque</p>
      <p class="stat-value">${d.emEstoque}</p>
      <p class="stat-sub">${fmtMoney(d.totalInvestido)} investidos</p>
    </div>
    <div class="stat">
      <p class="stat-label">Motos vendidas</p>
      <p class="stat-value">${d.vendidas}</p>
      <p class="stat-sub">Total no histórico</p>
    </div>
    <div class="stat">
      <p class="stat-label">Lucro total</p>
      <p class="stat-value ${lucroClass}">${fmtMoney(d.lucroTotal)}</p>
      <p class="stat-sub">Soma de todas as vendas</p>
    </div>
    <div class="stat">
      <p class="stat-label">Lucro médio por moto</p>
      <p class="stat-value">${fmtMoney(d.ticketMedio)}</p>
      <p class="stat-sub">Por moto vendida</p>
    </div>
  `;
}

function renderList(){
  const wrap = document.getElementById('listWrap');
  let list = motos.slice();
  if(currentFilter!=='todas') list = list.filter(m=>m.status===currentFilter);
  if(searchTerm){
    const t = searchTerm.toLowerCase();
    list = list.filter(m => (m.marca+' '+m.modelo+' '+(m.placa||'')).toLowerCase().includes(t));
  }
  list.sort((a,b)=> b.criadoEm - a.criadoEm);

  if(list.length===0){
    wrap.innerHTML = `<div class="empty">
      <p style="font-family:'Oswald',sans-serif;font-size:17px;text-transform:uppercase;color:var(--text-dim);">Nenhuma moto encontrada</p>
      <p>Cadastre uma moto para começar a controlar seu estoque.</p>
    </div>`;
    return;
  }

  wrap.innerHTML = `<div class="grid">${list.map(cardHtml).join('')}</div>`;
}

function cardHtml(m){
  const vendida = m.status==='vendida';
  let finHtml = `<div class="fin-row"><span class="label">Compra</span><span class="value">${fmtMoney(m.valorCompra)}</span></div>`;
  if(vendida){
    const lucro = Number(m.valorVenda||0) - Number(m.valorCompra||0);
    finHtml += `<div class="fin-row"><span class="label">Venda</span><span class="value">${fmtMoney(m.valorVenda)}</span></div>`;
    finHtml += `<div class="fin-row"><span class="label">Lucro</span><span class="value ${lucro>=0?'pos':'neg'}">${fmtMoney(lucro)}</span></div>`;
  }
  const actions = vendida
    ? `<button class="btn btn-sm" onclick="openEdit('${m.id}')">Editar</button>
       <button class="btn btn-sm btn-danger" onclick="removeMoto('${m.id}')">Excluir</button>`
    : `<button class="btn btn-sm btn-primary" onclick="openSell('${m.id}')">Vender</button>
       <button class="btn btn-sm" onclick="openEdit('${m.id}')">Editar</button>
       <button class="btn btn-sm btn-danger" onclick="removeMoto('${m.id}')">Excluir</button>`;

  return `<div class="card">
    <div class="card-top">
      <span class="plate">${m.placa ? m.placa.toUpperCase() : 'S/ PLACA'}</span>
      <span class="badge ${vendida?'badge-vendida':'badge-estoque'}">${vendida?'Vendida':'Estoque'}</span>
    </div>
    <div class="card-body">
      <p class="moto-title">${m.marca} ${m.modelo}</p>
      <p class="moto-meta">${m.ano||'—'} · ${m.cor||'Cor não informada'}${m.km ? ' · '+Number(m.km).toLocaleString('pt-BR')+' km' : ''}</p>
      ${finHtml}
    </div>
    <div class="card-actions">${actions}</div>
  </div>`;
}

function render(){
  renderDash();
  renderList();
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    renderList();
  });
});

document.getElementById('searchInput').addEventListener('input', e=>{
  searchTerm = e.target.value;
  renderList();
});

const modalForm = document.getElementById('modalForm');
const motoForm = document.getElementById('motoForm');

function openAdd(){
  document.getElementById('formTitle').textContent = 'Nova moto';
  motoForm.reset();
  document.getElementById('motoId').value = '';
  document.getElementById('fDataCompra').value = new Date().toISOString().slice(0,10);
  modalForm.classList.add('open');
}

function openEdit(id){
  const m = motos.find(x=>x.id===id);
  if(!m) return;
  document.getElementById('formTitle').textContent = 'Editar moto';
  document.getElementById('motoId').value = m.id;
  document.getElementById('fMarca').value = m.marca||'';
  document.getElementById('fModelo').value = m.modelo||'';
  document.getElementById('fAno').value = m.ano||'';
  document.getElementById('fPlaca').value = m.placa||'';
  document.getElementById('fCor').value = m.cor||'';
  document.getElementById('fKm').value = m.km||'';
  document.getElementById('fValorCompra').value = m.valorCompra||'';
  document.getElementById('fDataCompra').value = m.dataCompra||'';
  document.getElementById('fFornecedor').value = m.fornecedor||'';
  document.getElementById('fObs').value = m.obs||'';
  modalForm.classList.add('open');
}

document.getElementById('btnAdd').addEventListener('click', openAdd);
document.getElementById('btnCancelForm').addEventListener('click', ()=> modalForm.classList.remove('open'));

motoForm.addEventListener('submit', async e=>{
  e.preventDefault();
  const id = document.getElementById('motoId').value;
  const data = {
    marca: document.getElementById('fMarca').value.trim(),
    modelo: document.getElementById('fModelo').value.trim(),
    ano: document.getElementById('fAno').value,
    placa: document.getElementById('fPlaca').value.trim(),
    cor: document.getElementById('fCor').value.trim(),
    km: document.getElementById('fKm').value,
    valorCompra: document.getElementById('fValorCompra').value,
    dataCompra: document.getElementById('fDataCompra').value,
    fornecedor: document.getElementById('fFornecedor').value.trim(),
    obs: document.getElementById('fObs').value.trim(),
  };

  try {
    if(id){
      await db.collection('motos').doc(id).update(data);
    } else {
      const novaMoto = {
        status: 'estoque',
        criadoEm: Date.now(),
        ...data
      };
      await db.collection('motos').add(novaMoto);
    }
    modalForm.classList.remove('open');
  } catch (error) {
    console.error("Erro ao salvar no banco:", error);
    alert("Houve um erro ao salvar os dados no Firebase.");
  }
});

const modalSell = document.getElementById('modalSell');
const sellForm = document.getElementById('sellForm');

function openSell(id){
  document.getElementById('sMotoId').value = id;
  sellForm.reset();
  document.getElementById('sDataVenda').value = new Date().toISOString().slice(0,10);
  modalSell.classList.add('open');
}

document.getElementById('btnCancelSell').addEventListener('click', ()=> modalSell.classList.remove('open'));

sellForm.addEventListener('submit', async e=>{
  e.preventDefault();
  const id = document.getElementById('sMotoId').value;
  const m = motos.find(x=>x.id===id);
  if(!m) return;

  const sellData = {
    status: 'vendida',
    valorVenda: document.getElementById('sValorVenda').value,
    dataVenda: document.getElementById('sDataVenda').value,
    comprador: document.getElementById('sComprador').value.trim()
  };

  try {
    await db.collection('motos').doc(id).update(sellData);
    modalSell.classList.remove('open');
  } catch (error) {
    console.error("Erro ao registrar venda:", error);
    alert("Houve um erro ao registrar a venda.");
  }
});

async function removeMoto(id){
  const m = motos.find(x=>x.id===id);
  if(!m) return;
  if(!confirm(`Excluir ${m.marca} ${m.modelo} (${m.placa||'sem placa'})? Essa ação não pode ser desfeita.`)) return;
  
  try {
    await db.collection('motos').doc(id).delete();
  } catch (error) {
    console.error("Erro ao deletar:", error);
    alert("Não foi possível excluir o item do Firebase.");
  }
}

[modalForm, modalSell].forEach(ov=>{
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.classList.remove('open'); });
});

loadData();
</script>

</body>
